<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | MindWell AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-icon">
                🧠
            </div>

            <h1>Welcome Back</h1>

            <p class="auth-subtitle">
                Continue your mental wellbeing journey
            </p>


            <form method="POST"
                  action="{{ url_for('login') }}">

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >

                </div>


                <button type="submit"
                        class="auth-button">

                    Login

                </button>

            </form>


            <p class="switch-auth">

                Don't have an account?

                <a href="{{ url_for('signup') }}">
                    Create Account
                </a>

            </p>


            <a href="{{ url_for('index') }}"
               class="back-home">

                ← Back to Home

            </a>

        </div>

    </div>

</body>

</html>
