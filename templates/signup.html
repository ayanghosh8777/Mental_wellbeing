<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up | MindWell AI</title>


    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>


<body class="auth-body">


    <div class="auth-container">


        <div class="auth-card">


            <div class="auth-icon">
                🌱
            </div>


            <h1>Create Account</h1>


            <p class="auth-subtitle">

                Start your mental wellbeing journey

            </p>


            <form method="POST"
                  action="{{ url_for('signup') }}">


                <div class="input-group">

                    <label>Username</label>


                    <input
                        type="text"
                        name="username"
                        placeholder="Enter your username"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>Email</label>


                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >

                </div>


                <div class="input-group">

                    <label>Password</label>


                    <input
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        required
                    >

                </div>


                <button type="submit"
                        class="auth-button">

                    Create Account

                </button>


            </form>


            <p class="switch-auth">

                Already have an account?


                <a href="{{ url_for('login') }}">

                    Login

                </a>

            </p>


            <a href="{{ url_for('index') }}"
               class="back-home">

                ← Back to Home

            </a>


        </div>


    </div>


</body>

</html>
